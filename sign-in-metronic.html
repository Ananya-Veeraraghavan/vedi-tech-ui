 </head>
 <body class="antialiased flex h-full text-base text-foreground bg-background">
  <!-- Theme Mode -->
  <script>
   const defaultThemeMode = 'light'; // light|dark|system
			let themeMode;

			if (document.documentElement) {
				if (localStorage.getItem('kt-theme')) {
					themeMode = localStorage.getItem('kt-theme');
				} else if (
					document.documentElement.hasAttribute('data-kt-theme-mode')
				) {
					themeMode =
						document.documentElement.getAttribute('data-kt-theme-mode');
				} else {
					themeMode = defaultThemeMode;
				}

				if (themeMode === 'system') {
					themeMode = window.matchMedia('(prefers-color-scheme: dark)').matches
						? 'dark'
						: 'light';
				}

				document.documentElement.classList.add(themeMode);
			}
  </script>
  <!-- End of Theme Mode -->
  <!-- Page -->
  <style>
   .branded-bg {
			background-image:url('assets/media/images/2600x1600/1.png');
		}
		.dark .branded-bg {
			background-image: url('assets/media/images/2600x1600/1-dark.png');
		}
   .vedi-brand-icon {
    width: 44px;
    height: 44px;
    border-radius: 8px;
    background: #345f78;
   }
  </style>
  <div class="grid lg:grid-cols-2 grow">
   <div class="flex justify-center items-center p-8 lg:p-10 order-2 lg:order-1">
    <div class="kt-card max-w-[370px] w-full">
     <form class="kt-card-content flex flex-col gap-5 p-10" id="sign_in_form">
      <div class="flex flex-col items-center text-center gap-2 mb-2.5">
       <span class="vedi-brand-icon flex items-center justify-center">
        <i class="ki-filled ki-chart-simple text-white text-xl"></i>
       </span>
       <div class="flex flex-col gap-1 mt-1">
        <h1 class="text-lg font-semibold text-mono leading-none">VediTech</h1>
        <span class="text-xs font-medium text-secondary-foreground">Survey Jobs Portal</span>
       </div>
      </div>
      <div class="flex flex-col gap-1">
       <label class="kt-form-label font-normal text-mono">
        Email Address
       </label>
       <div class="kt-input flex items-center gap-2">
        <i class="ki-filled ki-sms text-muted-foreground text-base"></i>
        <input class="grow bg-transparent border-0 p-0 text-sm" name="email" placeholder="name@company.com" type="email" value=""/>
       </div>
      </div>
      <div class="flex flex-col gap-1">
       <div class="flex items-center justify-between gap-1">
        <label class="kt-form-label font-normal text-mono">
         Password
        </label>
        <a class="text-sm kt-link shrink-0" href="#">Forgot Password?</a>
       </div>
       <div class="kt-input flex items-center justify-between" data-kt-toggle-password="true">
        <div class="flex items-center gap-2 grow min-w-0">
         <i class="ki-filled ki-lock-2 text-muted-foreground text-base"></i>
         <input class="grow bg-transparent border-0 p-0 text-sm" name="user_password" placeholder="••••••••" type="password" value=""/>
        </div>
        <button class="kt-btn kt-btn-sm kt-btn-ghost kt-btn-icon bg-transparent! -me-1.5" data-kt-toggle-password-trigger="true" type="button">
         <span class="kt-toggle-password-active:hidden">
          <i class="ki-filled ki-eye text-muted-foreground">
          </i>
         </span>
         <span class="hidden kt-toggle-password-active:block">
          <i class="ki-filled ki-eye-slash text-muted-foreground">
          </i>
         </span>
        </button>
       </div>
      </div>
      <label class="kt-label">
       <input class="kt-checkbox kt-checkbox-sm" name="check" type="checkbox" value="1"/>
       <span class="kt-checkbox-label">
        Keep me signed in for 30 days
       </span>
      </label>
      <button class="kt-btn kt-btn-primary flex justify-center grow" type="submit">
       Sign In
      </button>
      <div class="border-t border-border pt-4 text-center text-xs text-secondary-foreground">
       Need an enterprise account? <a class="kt-link font-semibold" href="#">Contact Sales</a>
      </div>
      <div class="flex justify-center gap-2">
       <button class="kt-btn kt-btn-icon kt-btn-sm kt-btn-outline size-7" type="button" title="Executive" onclick="fillLogin('executive@veditech.com')">
        <i class="ki-filled ki-crown text-xs"></i>
       </button>
       <button class="kt-btn kt-btn-icon kt-btn-sm kt-btn-outline size-7" type="button" title="Manager" onclick="fillLogin('manager@veditech.com')">
        <i class="ki-filled ki-briefcase text-xs"></i>
       </button>
       <button class="kt-btn kt-btn-icon kt-btn-sm kt-btn-outline size-7" type="button" title="Team Lead" onclick="fillLogin('teamlead@veditech.com')">
        <i class="ki-filled ki-people text-xs"></i>
       </button>
       <button class="kt-btn kt-btn-icon kt-btn-sm kt-btn-outline size-7" type="button" title="Employee" onclick="fillLogin('employee@veditech.com')">
        <i class="ki-filled ki-user text-xs"></i>
       </button>
      </div>
     </form>
    </div>
   </div>
   <div class="lg:rounded-xl lg:border lg:border-border lg:m-5 order-1 lg:order-2 bg-top xxl:bg-center xl:bg-cover bg-no-repeat branded-bg">
    <div class="flex flex-col p-8 lg:p-16 gap-4">
     <a href="#">
      <span class="vedi-brand-icon flex items-center justify-center">
       <i class="ki-filled ki-chart-simple text-white text-xl"></i>
      </span>
     </a>
     <div class="flex flex-col gap-3">
      <h3 class="text-2xl font-semibold text-mono">
       VediTech Survey Portal
      </h3>
      <div class="text-base font-medium text-secondary-foreground">
       Streamlined land record management for
       <br/>
       <span class="text-mono font-semibold">enterprise survey operations</span>
       <br/>
       and field teams.
      </div>
     </div>
    </div>
   </div>
  </div>
  <!-- End of Page -->
  <!-- Scripts -->
  <script src="assets/js/core.bundle.js">
  </script>
  <script src="assets/vendors/ktui/ktui.min.js">
  </script>
  <script src="assets/vendors/apexcharts/apexcharts.min.js">
  </script>
  <script>
   const dummyUsers = {
    "executive@veditech.com": { password: "1234", redirect: "dashboards/exec-dashboard.html" },
    "manager@veditech.com": { password: "1234", redirect: "dashboards/exec-dashboard.html" },
    "teamlead@veditech.com": { password: "1234", redirect: "dashboards/tl-dashboard.html" },
    "employee@veditech.com": { password: "1234", redirect: "employee-dashboard.html" }
   };

   function fillLogin(email) {
    const form = document.getElementById("sign_in_form");
    form.email.value = email;
    form.user_password.value = "1234";
   }

   document.getElementById("sign_in_form").addEventListener("submit", function (event) {
    event.preventDefault();
    const email = this.email.value.trim().toLowerCase();
    const password = this.user_password.value;
    const user = dummyUsers[email];
    if (!user || user.password !== password) {
     alert("Invalid dummy login. Use a role shortcut or password 1234.");
     return;
    }
    window.location.href = user.redirect;
   });
  </script>
  <!-- End of Scripts -->
 </body>
</html>
